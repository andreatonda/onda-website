<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONDA – Creator-led Marketing & Brand Studio</title>
  <link rel="icon" type="image/png" href="favicon.png?v=5" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- HEADER / NAV -->
  <header class="site-header">
    <div class="shell">
      <nav class="nav">
        <a href="#overview" class="logo">
          <div class="logo-mark">
            <div class="logo-wave"></div>
          </div>
          <div class="logo-text">ONDA</div>
        </a>

        <div class="nav-main">
          <div class="nav-links">
            <a href="#overview" class="is-active" data-i18n="nav.overview"></a>
            <a href="#services" data-i18n="nav.services"></a>
            <a href="#creators" data-i18n="nav.creators"></a>
            <a href="#contact" data-i18n="nav.contact"></a>
          </div>

          <div class="nav-actions">
            <div class="nav-lang-toggle">
              <button class="nav-lang is-active" data-lang="en">EN</button>
              <button class="nav-lang" data-lang="zh">中文</button>
            </div>
            <a class="nav-cta" href="#contact">
              <span data-i18n="nav.book"></span>
              <span>↗</span>
            </a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <!-- OVERVIEW / HERO -->
    <section id="overview" class="section hero">
      <div class="shell hero-layout">
        <div class="hero-copy reveal">
          <p class="eyebrow" data-i18n="hero.eyebrow"></p>

          <h1 class="hero-title" data-i18n="hero.title"></h1>

          <p class="hero-lead" data-i18n="hero.lead"></p>

          <div class="hero-actions">
            <a class="btn-primary" href="#contact">
              <span data-i18n="hero.btn_primary"></span>
              <span>↗</span>
            </a>
            <a class="btn-ghost" href="#services">
              <span data-i18n="hero.btn_secondary"></span>
            </a>
          </div>

          <div class="hero-meta">
            <div>
              <strong data-i18n="hero.meta1_title"></strong>
              <span data-i18n="hero.meta1_body"></span>
            </div>
            <div>
              <strong data-i18n="hero.meta2_title"></strong>
              <span data-i18n="hero.meta2_body"></span>
            </div>
          </div>
        </div>

        <aside class="hero-aside reveal">
          <div class="hero-pill" data-i18n="hero.aside_tag"></div>
          <ul class="hero-list">
            <li data-i18n="hero.aside_li1"></li>
            <li data-i18n="hero.aside_li2"></li>
            <li data-i18n="hero.aside_li3"></li>
          </ul>

          <div class="platform-chips">
            <span class="chip">TikTok</span>
            <span class="chip">Instagram</span>
            <span class="chip">YouTube</span>
            <span class="chip">Amazon</span>
          </div>
        </aside>
      </div>
    </section>

    <!-- SERVICES -->
    <section id="services" class="section">
      <div class="shell">
        <div class="section-header reveal">
          <p class="section-kicker" data-i18n="services.kicker"></p>
          <h2 class="section-title" data-i18n="services.title"></h2>
          <p class="section-subtitle" data-i18n="services.subtitle"></p>
        </div>

        <div class="card-grid reveal">
          <article class="card">
            <p class="card-kicker" data-i18n="services.s1_kicker"></p>
            <h3 class="card-title" data-i18n="services.s1_title"></h3>
            <p class="card-body" data-i18n="services.s1_body"></p>
            <ul class="card-list">
              <li data-i18n="services.s1_li1"></li>
              <li data-i18n="services.s1_li2"></li>
              <li data-i18n="services.s1_li3"></li>
            </ul>
          </article>

          <article class="card">
            <p class="card-kicker" data-i18n="services.s2_kicker"></p>
            <h3 class="card-title" data-i18n="services.s2_title"></h3>
            <p class="card-body" data-i18n="services.s2_body"></p>
            <ul class="card-list">
              <li data-i18n="services.s2_li1"></li>
              <li data-i18n="services.s2_li2"></li>
              <li data-i18n="services.s2_li3"></li>
            </ul>
          </article>

          <article class="card">
            <p class="card-kicker" data-i18n="services.s3_kicker"></p>
            <h3 class="card-title" data-i18n="services.s3_title"></h3>
            <p class="card-body" data-i18n="services.s3_body"></p>
            <ul class="card-list">
              <li data-i18n="services.s3_li1"></li>
              <li data-i18n="services.s3_li2"></li>
              <li data-i18n="services.s3_li3"></li>
            </ul>
          </article>
        </div>
      </div>
    </section>

    <!-- CREATORS -->
    <section id="creators" class="section section-alt">
      <div class="shell">
        <div class="section-header reveal">
          <p class="section-kicker" data-i18n="creators.kicker"></p>
          <h2 class="section-title" data-i18n="creators.title"></h2>
        </div>

        <div class="two-column reveal">
          <div class="column">
            <p data-i18n="creators.p1"></p>
            <p data-i18n="creators.p2"></p>
          </div>
          <div class="column">
            <p data-i18n="creators.p3"></p>
            <p data-i18n="creators.p4"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section">
      <div class="shell">
        <div class="cta reveal">
          <div>
            <p class="section-kicker" data-i18n="contact.kicker"></p>
            <h2 class="section-title" data-i18n="contact.title"></h2>
            <p class="section-subtitle" data-i18n="contact.body"></p>
          </div>
          <a class="btn-primary" href="mailto:hello@meetonda.com">
            <span data-i18n="contact.btn"></span>
            <span>↗</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-inner">
      <span data-i18n="footer.copy"></span>
      <span>www.meetonda.com</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
